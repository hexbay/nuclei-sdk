run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - unparam
    - gocritic
    - gosec
    - revive

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true
  
  govet:
    enable-all: true
    disable:
      - shadow
  
  gofmt:
    simplify: true
  
  gocritic:
    enabled-tags:
      - diagnostic
      - experimental
      - opinionated
      - performance
      - style
  
  revive:
    rules:
      - name: exported
        disabled: true

issues:
  exclude-rules:
    # Exclude some linters from running on tests files
    - path: _test\.go
      linters:
        - gosec
        - errcheck
        - unparam
    
    # Exclude known issues
    - text: "weak cryptographic primitive"
      linters:
        - gosec
    
    # Exclude deprecated API warnings (we'll fix these gradually)
    - text: "SA1019.*deprecated"
      linters:
        - staticcheck
    
    # Exclude fieldalignment (performance optimization, not critical)
    - text: "fieldalignment"
      linters:
        - govet
    
    # Exclude copylocks for Options struct (intentional design)
    - text: "copylocks.*Options"
      linters:
        - govet
    
    # Exclude unused mutex (will be used in future)
    - text: "field `mutex` is unused"
      linters:
        - unused
    
    # Exclude defer in loop for file.Close (safe in this context)
    - text: "deferInLoop"
      linters:
        - gocritic
  
  max-issues-per-linter: 0
  max-same-issues: 0

output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
